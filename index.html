<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Combined Overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <!-- ScoreStream overlay (shown/hidden via Firebase) -->
  <div id="scorestreamWrap" style="display:none;position:fixed;overflow:hidden;"></div>

  <!-- Player card overlay (visual — hidden by default, shows for 7s when triggered) -->
  <div id="playerCard" class="player-card" style="display:none;">
    <div class="card-video" id="videoWrap">
      <video id="playerVideo" autoplay muted playsinline></video>
      <div class="watermark-number" id="watermarkNumber"></div>
      <div class="number-badge" id="playerNumber"></div>
    </div>
    <div class="card-info">
      <div class="player-name" id="playerName">
        <div class="player-first-name" id="playerFirstName"></div>
        <div class="player-last-name" id="playerLastName"></div>
      </div>
      <div class="stat-grid">
        <div class="stat">
          <span class="stat-value" id="playerGrade"></span>
          <span class="stat-label">Grade</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="playerHeight"></span>
          <span class="stat-label">Height</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="playerWeight"></span>
          <span class="stat-label">Weight</span>
        </div>
      </div>
    </div>
    <div class="team-bar"><span>Blue &amp; Gold Sports Network</span></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyABNKTrQKTiw4U78JGDFAw9eZDZM-3gK2s",
      authDomain: "bgsn-scoreboard.firebaseapp.com",
      projectId: "bgsn-scoreboard",
      storageBucket: "bgsn-scoreboard.firebasestorage.app",
      messagingSenderId: "888144845710",
      appId: "1:888144845710:web:fe848d883391be787622df"
    });
    const db = getFirestore(app);

    /* ========== Player Card Overlay ========== */
    const liveRef = doc(db, "playerOverlay", "live");
    const card = document.getElementById("playerCard");
    let isVisible = false;
    let autoHideTimer = null;
    const SHOW_DURATION = 7000;

    const params = new URLSearchParams(window.location.search);
    if (params.get("demo") === "1") document.body.classList.add("demo");
    const accentParam = params.get("accent");
    if (accentParam) card.style.setProperty("--accent", "#" + accentParam.replace(/^#/, ""));

    onSnapshot(liveRef, (snap) => {
      const d = snap.data();
      if (!d) return;

      var fullName = d.name || "Player Name";
      var nameParts = fullName.trim().split(/\s+/);
      var firstName = nameParts.length > 1 ? nameParts.slice(0, -1).join(" ") : "";
      var lastName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : fullName;
      setText("playerFirstName", firstName);
      setText("playerLastName", lastName);
      setText("playerNumber", d.number || "00");
      setText("watermarkNumber", d.number || "00");
      setText("playerGrade", d.grade || "\u2014");
      setText("playerHeight", d.height || "\u2014");
      setText("playerWeight", d.weight || "\u2014");

      updateVideo(d.video || "");
      applyFieldStyles(d.styles || {});

      if (d.visible && !isVisible) {
        showCard();
        scheduleAutoHide();
      } else if (d.visible && isVisible) {
        // Re-triggered while already showing — restart the 7s timer
        scheduleAutoHide();
      } else if (!d.visible && isVisible) {
        clearAutoHide();
        hideCard();
      }
    });

    function scheduleAutoHide() {
      clearAutoHide();
      autoHideTimer = setTimeout(() => {
        hideCard();
        // Write visible:false back to Firestore so controller stays in sync
        setDoc(liveRef, { visible: false }, { merge: true }).catch(() => {});
      }, SHOW_DURATION);
    }

    function clearAutoHide() {
      if (autoHideTimer) {
        clearTimeout(autoHideTimer);
        autoHideTimer = null;
      }
    }

    function updateVideo(src) {
      const videoEl = document.getElementById("playerVideo");
      const wrap = document.getElementById("videoWrap");
      if (src) {
        if (!videoEl) {
          const v = document.createElement("video");
          v.id = "playerVideo";
          v.autoplay = true;
          v.muted = true;
          v.playsInline = true;
          wrap.prepend(v);
          wrap.classList.remove("no-video");
          v.src = src;
          v.load();
        } else {
          if (videoEl.getAttribute("src") !== src) {
            videoEl.src = src;
            videoEl.load();
          }
          wrap.classList.remove("no-video");
        }
      } else {
        if (videoEl) videoEl.removeAttribute("src");
        wrap.classList.add("no-video");
      }
    }

    function showCard() {
      isVisible = true;
      card.style.display = "block";
      card.classList.remove("hidden");
      card.style.animation = "none";
      card.offsetHeight;
      card.style.animation = "";
    }

    function hideCard() {
      isVisible = false;
      card.classList.add("hidden");
      setTimeout(() => { card.style.display = "none"; }, 500);
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    const FIELD_MAP = {
      name: { el: "playerName", wrap: null },
      number: { el: "playerNumber", wrap: null },
      grade: { el: "playerGrade", wrap: ".stat:nth-child(1)" },
      height: { el: "playerHeight", wrap: ".stat:nth-child(2)" },
      weight: { el: "playerWeight", wrap: ".stat:nth-child(3)" },
    };

    function applyFieldStyles(styles) {
      const g = styles._global || {};
      const gx = g.offsetX || 0;
      const gy = g.offsetY || 0;
      const gz = g.zoom || 100;
      card.style.left = (40 + gx) + "px";
      card.style.bottom = (40 - gy) + "px";
      card.style.transform = gz !== 100 ? "scale(" + (gz / 100) + ")" : "";
      card.style.transformOrigin = "bottom left";

      Object.keys(FIELD_MAP).forEach(field => {
        const conf = styles[field] || {};
        const elId = FIELD_MAP[field].el;
        const el = document.getElementById(elId);
        const wrapSel = FIELD_MAP[field].wrap;
        const wrap = wrapSel ? card.querySelector(wrapSel) : el;
        if (!el || !wrap) return;

        wrap.style.display = conf.hidden ? "none" : "";
        if (field === "name") {
          var fn = document.getElementById("playerFirstName");
          var ln = document.getElementById("playerLastName");
          if (fn) fn.style.color = conf.color ? conf.color : "";
          if (ln) { ln.style.color = conf.color ? conf.color : ""; ln.style.fontSize = conf.fontSize ? conf.fontSize + "px" : ""; }
        } else {
          el.style.fontSize = conf.fontSize ? conf.fontSize + "px" : "";
          el.style.color = conf.color ? conf.color : "";
        }

        if (field !== "number") {
          if (conf.offsetX || conf.offsetY) {
            wrap.style.position = "relative";
            wrap.style.left = (conf.offsetX || 0) + "px";
            wrap.style.top = (conf.offsetY || 0) + "px";
          } else {
            wrap.style.position = "";
            wrap.style.left = "";
            wrap.style.top = "";
          }
        }
      });
    }

    /* ========== ScoreStream Overlay ========== */
    const ssRef = doc(db, "scorestream", "config");
    const ssWrap = document.getElementById("scorestreamWrap");

    function scoreStreamEmbedFromUrl(url) {
      try {
        const u = new URL(url);
        if (!u.hostname.endsWith("scorestream.com")) return "";
        const widgetId = u.searchParams.get("userWidgetId");
        if (!widgetId) return "";
        const widgetType = u.pathname.includes("/horz") ? "horzScoreboard" : "scoreboard";
        return '<div class="scorestream-widget-container" data-ss_widget_type="' + widgetType + '" data-user-widget-id="' + widgetId + '"></div>' +
          '<script async="async" type="text/javascript" src="https://scorestream.com/apiJsCdn/widgets/embed.js"></' + 'script>';
      } catch (_) {
        return "";
      }
    }

    function renderDirectScoreStream(target, html) {
      target.innerHTML = "";
      const template = document.createElement("template");
      template.innerHTML = html;
      template.content.querySelectorAll("script").forEach(script => script.remove());
      target.appendChild(template.content.cloneNode(true));
      const script = document.createElement("script");
      script.async = true;
      script.src = "https://scorestream.com/apiJsCdn/widgets/embed.js";
      target.appendChild(script);
    }

    function forceScoreStreamRepaint() {
      ssWrap.style.willChange = "transform, opacity";
      ssWrap.style.transform = "translate3d(0,0,0)";
      ssWrap.style.opacity = "0.999";
      void ssWrap.offsetHeight;
      requestAnimationFrame(() => {
        ssWrap.style.display = "none";
        void ssWrap.offsetHeight;
        ssWrap.style.display = "block";
        ssWrap.style.opacity = "1";
      });
    }

    onSnapshot(ssRef, (snap) => {
      const d = snap.data();
      if (!d) return;
      const nonce = d.renderNonce ? String(d.renderNonce) : "";
      const storedNonce = sessionStorage.getItem("scorestreamRenderNonce");
      if (nonce && storedNonce && nonce !== storedNonce) {
        sessionStorage.setItem("scorestreamRenderNonce", nonce);
        const url = new URL(window.location.href);
        url.searchParams.set("ssr", nonce);
        window.location.replace(url.toString());
        return;
      }
      if (nonce && !storedNonce) sessionStorage.setItem("scorestreamRenderNonce", nonce);
      const hasEmbed = d.embed && d.embed.trim();
      const hasUrl = d.url && d.url.trim();
      if (d.visible && (hasEmbed || hasUrl)) {
        const w = d.width || 1280;
        const h = d.height || 720;
        const scale = (d.scale || 100) / 100;
        const cropT = d.cropTop || 0;
        const cropB = d.cropBottom || 0;
        const cropL = d.cropLeft || 0;
        const cropR = d.cropRight || 0;
        const offsetX = d.offsetX || 0;
        const offsetY = d.offsetY || 0;
        const cw = (w - cropL - cropR) * scale;
        const ch = (h - cropT - cropB) * scale;
        ssWrap.style.width = cw + "px";
        ssWrap.style.height = ch + "px";
        ssWrap.style.top = offsetY + "px";
        ssWrap.style.left = offsetX + "px";
        ssWrap.style.zIndex = "10";
        const contentStyle = "position:absolute;border:none;" +
          "width:" + w + "px;height:" + h + "px;" +
          "top:" + (-cropT * scale) + "px;left:" + (-cropL * scale) + "px;" +
          "transform:scale(" + scale + ");transform-origin:top left;";
        const directEmbed = hasEmbed && d.embed.includes("scorestream-widget-container") ? d.embed : (hasUrl ? scoreStreamEmbedFromUrl(d.url) : "");
        if (directEmbed) {
          const content = document.createElement("div");
          content.setAttribute("style", contentStyle);
          ssWrap.innerHTML = "";
          ssWrap.appendChild(content);
          renderDirectScoreStream(content, directEmbed);
        } else if (hasEmbed) {
          const srcdoc = "<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;overflow:hidden;}</style></head><body>" +
            d.embed + "</body></html>";
          const iframe = document.createElement("iframe");
          iframe.setAttribute("style", contentStyle);
          iframe.srcdoc = srcdoc;
          ssWrap.innerHTML = "";
          ssWrap.appendChild(iframe);
        } else {
          ssWrap.innerHTML = '<iframe src="' + d.url + '" style="' + contentStyle + '" ' +
            'sandbox="allow-scripts allow-same-origin"></iframe>';
        }
        ssWrap.style.display = "block";
        forceScoreStreamRepaint();
      } else {
        ssWrap.style.display = "none";
        ssWrap.innerHTML = "";
      }
    });

    /* ========== Soundboard Audio Engine ========== */
    const triggerRef = doc(db, "soundboard", "trigger");
    let audioCtx = null;
    let masterGain = null;
    const bufferCache = new Map();
    const activeSources = new Set();
    const activeAudioElements = new Set();
    let lastTriggerTs = 0;

    function ensureAudioCtx() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.9;
        masterGain.connect(audioCtx.destination);
      } catch (e) {
        console.error("AudioContext failed:", e);
      }
    }

    async function loadSound(url) {
      if (bufferCache.has(url)) return bufferCache.get(url);
      const resp = await fetch(url);
      const arr = await resp.arrayBuffer();
      ensureAudioCtx();
      const buf = await audioCtx.decodeAudioData(arr);
      bufferCache.set(url, buf);
      return buf;
    }

    async function playSound(url, volume) {
      ensureAudioCtx();
      if (audioCtx && audioCtx.state === "suspended") {
        try { await audioCtx.resume(); } catch (_) {}
      }
      try {
        const buf = await loadSound(url);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const g = audioCtx.createGain();
        g.gain.value = typeof volume === "number" ? volume : 1;
        src.connect(g).connect(masterGain);
        const entry = { source: src, url };
        src.onended = () => activeSources.delete(entry);
        activeSources.add(entry);
        src.start(0);
      } catch (e) {
        const a = new Audio(url);
        const entry = { audio: a, url };
        a.volume = typeof volume === "number" ? volume : 1;
        a.onended = () => activeAudioElements.delete(entry);
        activeAudioElements.add(entry);
        a.play().catch(() => activeAudioElements.delete(entry));
      }
    }

    function stopAllSounds(url) {
      activeSources.forEach(entry => {
        if (!url || entry.url === url) {
          try { entry.source.stop(); } catch (_) {}
          activeSources.delete(entry);
        }
      });
      activeAudioElements.forEach(entry => {
        if (!url || entry.url === url) {
          try { entry.audio.pause(); entry.audio.currentTime = 0; } catch (_) {}
          activeAudioElements.delete(entry);
        }
      });
    }

    onSnapshot(triggerRef, (snap) => {
      const d = snap.data();
      if (!d) return;
      if (d.ts && d.ts > lastTriggerTs) {
        lastTriggerTs = d.ts;
        if (d.action === "stop") {
          const soundUrl = d.file ? (d.file.startsWith("http") ? d.file : "sounds/" + d.file) : "";
          stopAllSounds(soundUrl);
          return;
        }
        if (!d.file) return;
        const soundUrl = d.file.startsWith("http") ? d.file : "sounds/" + d.file;
        playSound(soundUrl, d.volume || 1);
      }
    });

    document.addEventListener("click", () => {
      ensureAudioCtx();
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    }, { once: true });
  </script>
</body>
</html>
